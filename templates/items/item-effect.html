<form class="flexcol {{cssClass}}" autocomplete="off">
    <header class="sheet-header-item">
        <div class="item-columned-page">
            <div style="width: 100px;">
                <img class="profile-img-item" src="{{data.img}}" data-edit="img" title="{{data.name}}" />
            </div>
            <div style="flex: 1">
                <h3 class="charname">
                    <input name="name" type="text" value="{{data.name}}" placeholder="Name" />
                </h3>
            </div>
        </div>
    </header>

    {{!-- Sheet Tab Navigation --}}
    <nav class="sheet-tabs tabs" data-group="primary">
        <a class="item" data-tab="details">Details</a>
        <a class="item" data-tab="description">Description</a>
    </nav>

    {{!-- Sheet Body --}}
    <section class="sheet-body">
        <div class="tab" data-group="primary" data-tab="details">
            {{#each systemData.modifiers as |mod|}}
                <div class="item-columned-page" style="align-items: center;">
                    <input class="effect-modify" data-index="{{@index}}" type="text" value="{{mod.modifier}}"/>
                    <input class="effect-modify" data-index="{{@index}}" type="number" value="{{mod.value}}" style="width: 45px;"/>
                    <a class="effect-delete" data-index="{{@index}}" title="{{ itemName 'delete' }}"><i class="fas fa-trash"></i></a>
                </div>
            {{/each}}
            <a class="effect-add" title="{{ itemName 'Create' }}" data-action="create"><i class="fas fa-plus"></i> {{ itemName "Add" }}</a>
        </div>
        {{> systems/the_edge/templates/items/meta-description.html}}
    </section>
</form>
